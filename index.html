<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Agents</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #ffffff;
    }

    header p {
      margin-top: 0.5rem;
      font-size: 0.95rem;
      color: #666;
    }

    main {
      width: 100%;
      max-width: 680px;
      padding: 1.5rem 1.5rem 6rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* ── Agent card ── */
    .agent-card {
      background: #161616;
      border: 1px solid #252525;
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .agent-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: #1e3a5f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .agent-info { flex: 1; }

    .agent-info h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e5e5e5;
    }

    .agent-info p {
      margin-top: 0.2rem;
      font-size: 0.8rem;
      color: #666;
    }

    .agent-status {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: #22c55e;
    }

    .agent-status::before {
      content: "";
      display: block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
    }

    .hint {
      text-align: center;
      font-size: 0.8rem;
      color: #444;
      margin-top: 0.5rem;
    }

    footer {
      margin-top: auto;
      padding: 1.5rem;
      font-size: 0.75rem;
      color: #333;
      text-align: center;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/gh/logspace-ai/langflow-embedded-chat@v1.0.7/dist/build/static/js/bundle.min.js"></script>
</head>
<body>

  <header>
    <h1>My Agents</h1>
    <p>Powered by Langflow</p>
  </header>

  <main>

    <div class="agent-card">
      <div class="agent-icon">🏴‍☠️</div>
      <div class="agent-info">
        <h2>Pirate test</h2>
        <p>Click the chat button → to start a conversation</p>
      </div>
      <div class="agent-status">Live</div>
    </div>

    <p class="hint">The chat bubble appears in the bottom-right corner</p>

  </main>

  <footer>Built with Langflow</footer>

  <!--
    ⚠️  host_url must be publicly reachable.
        Locally: run `ngrok http 7860` and paste the ngrok URL below.
        In production: replace with your hosted Langflow URL.
  -->
  <langflow-chat
    window_title="Pirate test"
    flow_id="dd5873b8-87c8-48b0-b76d-370a629b0402"
    host_url="http://localhost:7860"
    chat_position="bottom-right"
  ></langflow-chat>

</body>
</html>
