<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Agents</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 2rem 2rem 1.5rem;
      text-align: center;
      border-bottom: 1px solid #1e1e1e;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #ffffff;
    }

    header p {
      margin-top: 0.4rem;
      font-size: 0.9rem;
      color: #888;
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 860px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* ── Agent card ── */
    .agent-card {
      background: #161616;
      border: 1px solid #252525;
      border-radius: 12px;
      overflow: hidden;
    }

    .agent-card-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #252525;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .agent-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    .agent-card-header h2 {
      font-size: 1rem;
      font-weight: 500;
      color: #e5e5e5;
    }

    .agent-card-header span {
      margin-left: auto;
      font-size: 0.75rem;
      color: #555;
    }

    .agent-card-body {
      padding: 1.25rem;
      min-height: 420px;
      display: flex;
      align-items: stretch;
    }

    langflow-chat {
      width: 100%;
    }

    footer {
      padding: 1.5rem;
      font-size: 0.75rem;
      color: #444;
      text-align: center;
    }
  </style>

  <!--
    Langflow embedded chat widget.
    Docs: https://github.com/logspace-ai/langflow-embedded-chat
  -->
  <script src="https://cdn.jsdelivr.net/gh/logspace-ai/langflow-embedded-chat@v1.0.7/dist/build/static/js/bundle.min.js"></script>
</head>
<body>

  <header>
    <h1>My Agents</h1>
    <p>Powered by Langflow</p>
  </header>

  <main>

    <div class="agent-card">
      <div class="agent-card-header">
        <div class="agent-dot"></div>
        <h2>Pirate test</h2>
        <span>Langflow agent</span>
      </div>
      <div class="agent-card-body">
        <!--
          ⚠️  host_url must be a publicly reachable URL when deployed.
              While testing locally you can expose Langflow with:
                ngrok http 7860
              Then replace http://localhost:7860 with your ngrok URL.
        -->
        <langflow-chat
          window_title="Pirate test"
          flow_id="dd5873b8-87c8-48b0-b76d-370a629b0402"
          host_url="http://localhost:7860"
        ></langflow-chat>
      </div>
    </div>

  </main>

  <footer>Built with Langflow</footer>

</body>
</html>
